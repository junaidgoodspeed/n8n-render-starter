services:
  - type: web
    name: n8n-service
    region: frankfurt
    plan: starter
    env: docker
    image:
      url: docker.io/n8nio/n8n:latest
    autoDeploy: true
    healthCheckPath: /healthz
    disk:
      name: n8n-data
      mountPath: /home/node/.n8n/binaryData
      sizeGB: 1
    envVars:
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: n8n-db
          property: database
      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: n8n-db
          property: host
      - key: DB_POSTGRESDB_PORT
        fromDatabase:
          name: n8n-db
          property: port
      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: n8n-db
          property: user
      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: n8n-db
          property: password
      - key: DB_POSTGRESDB_SCHEMA
        value: public
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      - key: WEBHOOK_URL
        value: https://n8n-service.onrender.com
      - key: N8N_HOST
        value: n8n-service.onrender.com
      - key: N8N_PROTOCOL
        value: https
      - key: PORT
        value: "5678"
      - key: GENERIC_TIMEZONE
        value: Europe/London
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        value: admin
      - key: N8N_BASIC_AUTH_PASSWORD
        value: changeme123!

databases:
  - name: n8n-db
    region: frankfurt
    plan: basic-256mb
    databaseName: n8n
    user: n8n
